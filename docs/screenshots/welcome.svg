<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#343541"/>
      <stop offset="100%" style="stop-color:#202123"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)" rx="8"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="600" height="50" fill="#202123" rx="8"/>
  <text x="300" y="32" font-family="Segoe UI, sans-serif" font-size="16" fill="#ececf1" text-anchor="middle" font-weight="600">🤖 ChatGPT Clone</text>
  <circle cx="560" cy="25" r="6" fill="#22c55e"/>
  
  <!-- Welcome Content -->
  <text x="300" y="140" font-family="Segoe UI, sans-serif" font-size="48" text-anchor="middle">🤖</text>
  <text x="300" y="190" font-family="Segoe UI, sans-serif" font-size="22" fill="#ececf1" text-anchor="middle" font-weight="600">Bem-vindo ao ChatGPT Clone</text>
  <text x="300" y="220" font-family="Segoe UI, sans-serif" font-size="13" fill="#8e8ea0" text-anchor="middle">Node.js • React • OpenAI API</text>
  
  <!-- Tips Box -->
  <rect x="100" y="250" width="400" height="110" fill="#444654" rx="8"/>
  <text x="120" y="275" font-family="Segoe UI, sans-serif" font-size="12" fill="#8e8ea0" font-weight="600">💡 DICAS DE USO</text>
  <text x="120" y="298" font-family="Segoe UI, sans-serif" font-size="11" fill="#ececf1">• Digite sua pergunta no campo abaixo</text>
  <text x="120" y="316" font-family="Segoe UI, sans-serif" font-size="11" fill="#ececf1">• Pressione Enter para enviar</text>
  <text x="120" y="334" font-family="Segoe UI, sans-serif" font-size="11" fill="#ececf1">• Use Shift + Enter para quebra de linha</text>
  <text x="120" y="352" font-family="Segoe UI, sans-serif" font-size="11" fill="#ececf1">• O servidor deve estar rodando na porta 5000</text>
</svg>
